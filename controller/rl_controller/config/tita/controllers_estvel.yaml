# This config file is used by ros2_control
/**:
  controller_manager:
    ros__parameters:
      update_rate: 500  # Hz
      # is_async: true

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      imu_sensor_broadcaster:
        type: imu_sensor_broadcaster/IMUSensorBroadcaster
      tita_rl_controller:
        type: rl_controller/RlController

  imu_sensor_broadcaster:
    ros__parameters:
      update_rate: 500  # Hz
      sensor_name: trunk_imu
      frame_id: trunk_imu
  joint_state_broadcaster:
    ros__parameters:
      update_rate: 500  # Hz

  tita_rl_controller:
    ros__parameters:
      update_rate: 500  # Hz
      joints:
        - joint_left_leg_1
        - joint_left_leg_2
        - joint_left_leg_3
        - joint_left_leg_4
        - joint_right_leg_1
        - joint_right_leg_2
        - joint_right_leg_3
        - joint_right_leg_4
      command_interfaces:
        - position
        - velocity
        - effort
        - kp
        - kd
      state_interfaces:
        - position
        - velocity
        - effort
      sensors:
        - trunk_imu

      # control parameters
      torque_limit: [60.0, 60.0, 60.0, 20.0, 60.0, 60.0, 60.0, 20.0]
      wheel_indices: [3, 7]
      hip_indices: [0, 4]

      # fsm

      transform_up:
        fold_jpos: [0.75, 1.20, -2.7, 0.0, -0.75, 1.2, -2.7, 0.0]
        stand_jpos: [-0.05, 0.9, -2.6, 0.0, 0.05, 0.90, -2.6, 0.0]
        fold_timer: 4.0
        stand_timer: 2.0
        #
        ff_torque: [-20.0, 0.0, -25.0, 0.0, 20.0, 0.0, -25.0, 0.0]
        joint_kp: [600.0, 80.0, 80.0, 5.0, 600.0, 80.0, 80.0, 5.0]
        joint_kd: [8.0, 8.0, 8.0, 0.5, 8.0, 8.0, 8.0, 0.5]

      transform_down:
        fold_jpos: [0.5, 1.20, -2.7, 0.0, -0.5, 1.2, -2.7, 0.0]
        fold_timer: 4.0
        joint_kp: [600.0, 80.0, 80.0, 5.0, 600.0, 80.0, 80.0, 5.0]
        joint_kd: [8.0, 8.0, 8.0, 0.2, 8.0, 8.0, 8.0, 0.2]

      joint_pd:
        joint_kp: [600.0, 80.0, 80.0, 5.0, 600.0, 80.0, 80.0, 5.0]
        joint_kd: [8.0, 8.0, 8.0, 0.2, 8.0, 8.0, 8.0, 0.2]
      rl_policy_names:
        - "rl_flat"

      rl_flat:
        # Dual-ONNX velocity-estimator policy. Put both ONNX files in this directory.
        policy_path: config/tita/withVelocityEstimatorOnnx/actor_policy.onnx
        output_name: "actions"
        policy_type: "ppo"
        use_velocity_estimator: true
        estimator_policy_path: config/tita/withVelocityEstimatorOnnx/estimator_policy.onnx
        estimator_output_name: "estimated_velocity"
        estimator_history_len: 3
        # env
        num_obs: 33
        num_actions: 8
        history_len: 10
        observations_history_mode: "term"  # term or frame
        observations_name: ["ang_vel", "gravity", "commands", "dof_pos_nwp", "dof_vel", "last_actions", "base_lin_vel_xy"]
        observations_dims: [3, 3, 3, 6, 8, 8, 2]
        commands_name: ["lin_vel_x", "lin_vel_y", "ang_vel_z"]
        commands_scale: [2.0, 2.0, 0.25] # lin_vel_scale, lin_vel_scale, ang_vel_scale
        max_commands: [1.0, 0.0, 1.0]
        min_commands: [-1.0, -0.0, -1.0]
        commands_comp: [0.0, 0.0, 0.0] # direct add offset to command
        # In dual-ONNX mode, base_lin_vel_xy is supplied by estimator_policy.onnx.
        # These topics are retained for schema compatibility but are not subscribed.
        base_lin_vel_xy:
          sim_topic: "/tita/gps/speed_vector"
          sim_rate_hz: 100
          hw_topic: "/tita4253234/robot_vel"
          hw_rate_hz: 100
        # control parameters
        time_interval: 0.02 # match Isaac Lab policy step: sim.dt(0.005) * decimation(4)
        default_joint_angles: [0.0, 0.8, -1.5, 0.0, 0.0, 0.8, -1.5, 0.0]
        joint_kp: [40.0, 40.0, 40.0, 12.0, 40.0, 40.0, 40.0, 12.0]
        joint_kd: [1.0, 1.0, 1.0, 0.8, 1.0, 1.0, 1.0, 0.8]
        action_scales: [0.25, 0.5, 0.5, 0.5, 0.25, 0.5, 0.5, 0.5]

        lin_vel_scale: 2.0
        ang_vel_scale: 0.25
        dof_pos_scale: 1.0
        dof_vel_scale: 0.05

        # extra
        # Proprioceptive observation order used in the Isaac Lab training setup:
        # dof_pos_nwp: [L1, R1, L2, R2, L3, R3]
        # dof_vel:     [L1, R1, L2, R2, L3, R3, L4, R4]
        observation_reindex: [0, 4, 1, 5, 2, 6, 3, 7]
